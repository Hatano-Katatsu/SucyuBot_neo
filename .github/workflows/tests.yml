name: tests

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: "22"

      - name: Install locked dependencies
        run: python -m pip install --require-hashes -r requirements.txt
      - name: Run Python tests
        run: python -m unittest discover -s tests -q
      - name: Check Python syntax
        run: python -m compileall -q telegram_comfyui_selfie tests
      - name: Check frontend syntax
        run: node --check telegram_comfyui_selfie/static/app.js
      - name: Validate example config
        run: python -m json.tool config.example.json > /dev/null
