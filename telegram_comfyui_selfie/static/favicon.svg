<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" shape-rendering="crispEdges">
  <!-- 小恶魔角 -->
  <g fill="#6d3a8f">
    <rect x="3" y="1" width="1" height="1"/><rect x="12" y="1" width="1" height="1"/>
    <rect x="3" y="2" width="2" height="1"/><rect x="11" y="2" width="2" height="1"/>
  </g>
  <!-- 紫发 -->
  <g fill="#9b59d0">
    <rect x="4" y="3" width="8" height="1"/>
    <rect x="3" y="4" width="10" height="1"/>
    <rect x="2" y="5" width="2" height="6"/><rect x="12" y="5" width="2" height="6"/>
    <rect x="3" y="11" width="1" height="1"/><rect x="12" y="11" width="1" height="1"/>
    <rect x="4" y="12" width="1" height="1"/><rect x="11" y="12" width="1" height="1"/>
  </g>
  <!-- 脸 -->
  <g fill="#ffd9ef">
    <rect x="4" y="5" width="8" height="2"/>
    <rect x="4" y="7" width="1" height="1"/><rect x="7" y="7" width="2" height="1"/><rect x="11" y="7" width="1" height="1"/>
    <rect x="4" y="8" width="1" height="1"/><rect x="7" y="8" width="2" height="1"/><rect x="11" y="8" width="1" height="1"/>
    <rect x="5" y="9" width="6" height="1"/>
    <rect x="4" y="10" width="3" height="1"/><rect x="9" y="10" width="3" height="1"/>
    <rect x="4" y="11" width="8" height="1"/>
    <rect x="5" y="12" width="6" height="1"/>
    <rect x="5" y="13" width="6" height="1"/>
    <rect x="6" y="14" width="4" height="1"/>
  </g>
  <!-- 大眼（白底） -->
  <g fill="#ffffff">
    <rect x="5" y="7" width="2" height="1"/><rect x="9" y="7" width="2" height="1"/>
    <rect x="5" y="8" width="1" height="1"/><rect x="9" y="8" width="1" height="1"/>
  </g>
  <!-- 瞳孔 -->
  <g fill="#5a2a6e">
    <rect x="6" y="8" width="1" height="1"/><rect x="10" y="8" width="1" height="1"/>
  </g>
  <!-- 腮红 -->
  <g fill="#ff9ccf">
    <rect x="4" y="9" width="1" height="1"/><rect x="11" y="9" width="1" height="1"/>
  </g>
  <!-- 小嘴 -->
  <rect x="7" y="10" width="2" height="1" fill="#c9568f"/>
</svg>
